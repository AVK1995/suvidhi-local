<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#CB4A5D" />
    <meta name="description" content="The Postpartum Restore™ is a 25-minute guided assessment that helps you find out exactly why your body hasn't fully recovered after baby — and what to do about it. By a UK-trained clinical nutritionist." />
    <meta property="og:title" content="Suvidhi — The Postpartum Restore™" />
    <meta property="og:description" content="Find out exactly why your body hasn't fully recovered after baby, and what to do about it, in just 25 minutes." />
    <meta property="og:type" content="website" />

    <!-- Preconnects for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://checkout.razorpay.com" />
    <link rel="preconnect" href="https://connect.facebook.net" />
    <link rel="preconnect" href="https://calendly.com" />

    <!-- Fonts: Poppins (headings) + Inter (body) — trimmed to only the weights actually used -->
    <!-- Load fonts without blocking first paint: fetch as non-applying
         (media=print), then flip to all on load. display=swap renders text in
         the fallback immediately, so there's no invisible-text delay. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!--
      No hero image preload: the funnel currently ships with landscape image
      placeholders (no Suvidhi photography yet), so there is no LCP image to
      preload. Re-add a preload here when real hero media lands.
    -->

    <!--
      Meta Pixel and other client analytics are initialised at runtime
      inside src/lib/tracking.ts using the env-driven VITE_META_PIXEL_ID.
      We deliberately do NOT hard-code the pixel ID here so the same build
      can target prod / staging / dev environments via env vars.
    -->
    <title>Suvidhi — The Postpartum Restore™ · Find Out Why You Haven't Recovered</title>
  </head>
  <body class="bg-cream text-ink-900 antialiased">
    <noscript>
      <p style="font-family: system-ui; padding: 24px; max-width: 480px; margin: 0 auto;">
        Suvidhi runs on a modern browser with JavaScript enabled. Please enable
        JavaScript and reload, or email us at innohealthbysush@gmail.com.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
